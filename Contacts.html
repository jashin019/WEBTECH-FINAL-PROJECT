<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NanoNexus — Contacts</title>
  <link rel="stylesheet" href="Homepage.css">
  <link rel="stylesheet" href="portfolio.css">
  <link rel="stylesheet" href="contacts.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="portfolio-page">
  <header>
    <h1>NanoNexus</h1>
    <nav>
      <a href="NanoNexus.html">Home</a>
      <a href="Contacts.html">Contact</a>
      <a href="portfolio.html">About us</a>
      <a href="sign up.html">Sign up</a>
    </nav>
    <div class="header-actions">
      <input type="search" placeholder="Search for Something?" class="search-bar" />
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2>Contact Us</h2>
      <p class="lead">Questions about products, orders, or partnerships? Reach out — we're here to help.</p>
    </section>

    <section class="contact-grid" id="contact-grid" aria-live="polite">

    </section>

    <section class="contact-form-section">
      <h3>Send us a quick message</h3>
      <form id="contact-form" class="contact-form" action="#" onsubmit="handleFormSubmit(event)" novalidate>
        <label>
          <span>Name</span>
          <input type="text" id="name" required />
        </label>

        <label>
          <span>Your Email (must be Gmail)</span>
          <input type="email" id="email" placeholder="you@gmail.com" required />
        </label>

        <label>
          <span>Message</span>
          <textarea id="message" rows="5" required></textarea>
        </label>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Send Message</button>
          <button type="reset" class="btn-secondary">Reset</button>
        </div>

        <p id="form-status" class="form-status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="main-footer">
    <div class="footer-content">
      <p>&copy; 2026 NanoNexus. All rights reserved.</p>
      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
      </div>
    </div>
  </footer>

  <script src="contacts.js"></script>
</body>

</html>
