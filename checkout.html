<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Checkout — NanoNexus</title>
  <link rel="stylesheet" href="NanoNexus.css">
  <link rel="stylesheet" href="checkout.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="brand"><a href="NanoNexus.html">NanoNexus</a></h1>
      <nav class="nav"><a href="NanoNexus.html">Home</a><a href="portfolio.html">About</a></nav>
    </div>
  </header>

  <main class="container checkout-wrap">
    <h2>Checkout</h2>
    <div id="order" class="order-list"></div>

    <div class="totals">
      <div>Subtotal: ₱<span id="subtotal">0.00</span></div>
    </div>

    <form id="checkoutForm" class="checkout-form" novalidate>
      <div class="form-grid">
        <input id="name" name="name" placeholder="Full name" required>
        <!-- phone input: numeric keyboard on mobile, maxlength, and aria -->
        <input id="phone" name="phone" placeholder="Phone number (e.g. 09XXXXXXXXX or +639XXXXXXXXX)"
               inputmode="tel" autocomplete="tel" maxlength="14" aria-describedby="phoneHelp" required>
      </div>

      <div style="margin-top:8px">
        <input id="address" name="address" placeholder="Shipping address" required>
      </div>

      <div id="phoneHelp" class="field-help muted">Only digits allowed. Local example: 09XXXXXXXXX. International: +63XXXXXXXXXX.</div>
      <div id="phoneError" class="field-error" aria-live="polite" hidden></div>

      <div class="payment-row" style="margin-top:12px">
        <label for="pay">Payment</label>
        <select id="pay" name="pay">
          <option value="cod">Cash on Delivery</option>
          <option value="gcash">GCash / e-wallet</option>
          <option value="card">Card (test)</option>
        </select>
      </div>

      <div class="form-actions">
        <button id="back" class="btn outline" type="button" onclick="history.back()">Back</button>
        <button id="place" class="btn primary" type="submit" disabled>Place order</button>
      </div>

      <div id="msg" class="msg"></div>
    </form>
  </main>

  <footer class="site-footer"><div class="container">&copy; 2026 NanoNexus</div></footer>

  <script src="checkout.js"></script>
</body>
</html>
