<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Checkout — NanoNexus</title>
  <link rel="stylesheet" href="NanoNexus.css">
  <link rel="stylesheet" href="checkout.css">
  <link rel="stylesheet" href="clarenec.css">
</head>
<body>
  <header>
      <h1 style="color:black">NanoNexus</h1>
        <nav><a href="NanoNexus.html">Home</a><a href="Contacts.html">Contact</a><a href="portfolio.html">About us</a><a href="sign up.html">Sign up</a></nav>
        <div class="header-actions">
        <button id="cb" class="cart-btn"> <span id="cc">0</span></button>
        </div>
    </header>

  <main class="container checkout-wrap">
    <h2>Checkout</h2>
    <div id="order" class="order-list"></div>

    <div class="totals">
      <div>Subtotal: ₱<span id="subtotal">0.00</span></div>
    </div>

    <form id="checkoutForm" class="checkout-form" onsubmit="return false;">
      <div class="form-grid">
        <input id="name" placeholder="Full name" required>
        <input id="phone" placeholder="Phone number" required>
        <input id="address" placeholder="Shipping address" required>
      </div>

      <div class="payment-row">
        <label for="pay">Payment</label>
        <select id="pay">
          <option value="cod">Cash on Delivery</option>
          <option value="gcash">GCash / e-wallet</option>
          <option value="card">Card (test)</option>
        </select>
      </div>

      <div class="form-actions">
        <button id="back" class="btn outline" onclick="history.back()">Back</button>
        <button id="place" class="btn primary">Place order</button>
      </div>

      <div id="msg" class="msg"></div>
    </form>
  </main>

  <footer class="main-footer">
    <p>&copy; 2026 NanoNexus. <a href="#">Privacy</a> | <a href="#">Terms</a></p>
      
      <div class="footer-nav">
        <h6>Navigations</h6>

        <nav><a href="sign up.html">Sign up</a></nav>
      </div>
    
      <div class="members">
        <h6>Member Socials</h6>
        <div class="members_socials">
          <nav><a href="https://github.com/jashin019">Justin Baysa</a></nav>
          <nav><a href="#">Peter Edem</a></nav>
          <nav><a href="https://github.com/feirkedelossantos6-ops">Feirke Delos Santos</a></nav>
          <nav><a href="https://github.com/santiagoclarencejames24-jpg">Clarence James Santiago</a></nav>
          <nav><a href="https://github.com/john445599">John Kirby Tolentino</a></nav>
        </div>
    </div>
  </footer>

  <script src="checkout.js"></script>
</body>
</html>
